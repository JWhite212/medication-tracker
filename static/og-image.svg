<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="630" fill="#0a0a0f"/>
  <rect x="0" y="0" width="1200" height="630" fill="url(#grad)" opacity="0.5"/>
  <defs>
    <radialGradient id="grad" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#0a0a0f" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Logo -->
  <rect x="520" y="180" width="64" height="64" rx="16" fill="#6366f1"/>
  <text x="552" y="225" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="700" fill="white">M</text>
  <!-- App name -->
  <text x="600" y="300" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="48" font-weight="700" fill="#f0f0f5">MedTracker</text>
  <!-- Tagline -->
  <text x="600" y="350" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="24" fill="#8888a0">Track your medications effortlessly</text>
  <!-- Feature pills -->
  <rect x="280" y="400" width="160" height="40" rx="20" fill="rgba(99,102,241,0.15)" stroke="rgba(99,102,241,0.3)" stroke-width="1"/>
  <text x="360" y="425" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#8888a0">Live Timers</text>
  <rect x="470" y="400" width="160" height="40" rx="20" fill="rgba(16,185,129,0.15)" stroke="rgba(16,185,129,0.3)" stroke-width="1"/>
  <text x="550" y="425" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#8888a0">Analytics</text>
  <rect x="660" y="400" width="160" height="40" rx="20" fill="rgba(245,158,11,0.15)" stroke="rgba(245,158,11,0.3)" stroke-width="1"/>
  <text x="740" y="425" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#8888a0">Secure</text>
  <!-- Bottom accent line -->
  <rect x="400" y="600" width="400" height="3" rx="1.5" fill="#6366f1" opacity="0.5"/>
</svg>
